<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubra Guará - Bem-vindo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --rubra: #d25240;
      --aqua: #6c9ea9;
      --verde: #325543;
      --marrom: #6c3229;
      --creme: #fff1f1;
      --branco: #ffffff;
      --sombra: rgba(50, 85, 67, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--creme) 0%, #e8f5f2 50%, #fff8f8 100%);
      color: var(--verde);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* Floating background shapes */
    .bg-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.18;
      filter: blur(40px);
      animation: float 8s ease-in-out infinite;
    }

    .shape-1 {
      width: 260px;
      height: 260px;
      background: var(--rubra);
      top: -60px;
      right: -70px;
      animation-delay: 0s;
    }

    .shape-2 {
      width: 200px;
      height: 200px;
      background: var(--aqua);
      bottom: 120px;
      left: -50px;
      animation-delay: 2s;
    }

    .shape-3 {
      width: 160px;
      height: 160px;
      background: var(--verde);
      top: 45%;
      right: 10%;
      animation-delay: 4s;
    }

    .shape-4 {
      width: 120px;
      height: 120px;
      background: var(--marrom);
      bottom: 10%;
      right: 20%;
      animation-delay: 1.5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-24px) scale(1.05); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(210, 82, 64, 0.35); }
      50% { transform: scale(1.03); box-shadow: 0 0 0 14px rgba(210, 82, 64, 0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Layout */
    .wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
      position: relative;
      z-index: 1;
      animation: fadeIn 1s ease-out;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 28px;
      padding: 44px 32px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 22px 60px var(--sombra);
      animation: slideInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .logo {
  width: 110px;
  height: 110px;
  margin: 0 auto 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, var(--rubra), var(--marrom));
  border-radius: 50%;
  box-shadow: 0 14px 34px rgba(210, 82, 64, 0.28);
  animation: pulse 2.2s ease-in-out infinite;
  overflow: hidden;
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
    .title {
      font-family: 'Poppins', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--rubra);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      animation: slideInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }

    .subtitle {
      font-family: 'Poppins', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--aqua);
      margin-bottom: 20px;
      animation: slideInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both;
    }

    .description {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--verde);
      opacity: 0.9;
      margin-bottom: 32px;
      animation: slideInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: slideInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 26px;
      border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--rubra), var(--marrom));
      color: var(--branco);
      box-shadow: 0 10px 28px rgba(210, 82, 64, 0.32);
    }

    .btn-primary:hover,
    .btn-primary:focus {
      transform: translateY(-3px);
      box-shadow: 0 16px 38px rgba(210, 82, 64, 0.38);
    }

    .btn-secondary {
      background: transparent;
      color: var(--verde);
      border: 2px solid var(--aqua);
    }

    .btn-secondary:hover,
    .btn-secondary:focus {
      background: var(--aqua);
      color: var(--branco);
      transform: translateY(-3px);
      box-shadow: 0 10px 26px rgba(108, 158, 169, 0.28);
    }

    .btn-icon {
      font-size: 1.2em;
      transition: transform 0.3s ease;
    }

    .btn-primary:hover .btn-icon,
    .btn-primary:focus .btn-icon {
      animation: spin 0.6s linear;
    }

    .btn-secondary:hover .btn-icon,
    .btn-secondary:focus .btn-icon {
      transform: translateX(4px);
    }

    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 18px;
      font-size: 0.85rem;
      color: var(--verde);
      opacity: 0.7;
      animation: fadeIn 1.2s ease-out 0.8s both;
    }

    /* Decorative badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(108, 158, 169, 0.14);
      color: var(--aqua);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
      animation: slideInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      background: var(--rubra);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    /* Responsive */
    @media (min-width: 560px) {
      .card {
        padding: 56px 44px;
      }

      .title {
        font-size: 2.6rem;
      }

      .subtitle {
        font-size: 1.25rem;
      }

      .buttons {
        flex-direction: row;
        justify-content: center;
        gap: 16px;
      }

      .btn {
        flex: 1;
        max-width: 200px;
      }
    }

    @media (min-width: 900px) {
      .shape-1 { width: 340px; height: 340px; }
      .shape-2 { width: 260px; height: 260px; }
      .shape-3 { width: 200px; height: 200px; }
      .shape-4 { width: 160px; height: 160px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="bg-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <main class="wrapper">
    <article class="card">
      <div class="badge">
        <span class="badge-dot"></span>
        TCC — Rubra Guará
      </div>

      <div class="logo">
  <img src="images/logo-colorida-rubra.png" alt="Logo Rubra Guará">
</div>

      <h1 class="title">Rubra Guará</h1>
      <p class="subtitle">Registro de espécies do manguezal de São Paulo.</p>

      <p class="description">
        Mapeamento por meio de registros fotográficos das espécies encontradas no manguezal, feita por turistas e colaboradores, integrada à inteligência artificial.
      </p>

      <div class="buttons">
        <a href="/camera" class="btn btn-primary">
          <span class="btn-icon">📷</span>
          Começar
        </a>
        
      </div>
    </article>
  </main>

  <footer class="footer">
    © 2025 Rubra Guará. Todos os direitos reservados.
  </footer>

</body>
</html>
